<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba Calculadora RFC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gradient-to-br from-purple-600 to-pink-600 min-h-screen py-12 px-4">
    <div class="max-w-2xl mx-auto bg-white rounded-lg shadow-2xl p-8">
        <h1 class="text-3xl font-bold text-purple-800 mb-6">
            <i class="fas fa-calculator mr-2"></i>Calculadora de RFC
        </h1>

        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Nombre(s)</label>
                <input type="text" id="nombre" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500" placeholder="Juan Carlos">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Apellido Paterno</label>
                <input type="text" id="apellidoPaterno" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500" placeholder="Pérez">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Apellido Materno</label>
                <input type="text" id="apellidoMaterno" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500" placeholder="García">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Fecha de Nacimiento</label>
                <input type="date" id="fechaNacimiento" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500">
            </div>

            <div class="bg-purple-50 border-2 border-purple-300 rounded-lg p-6 mt-6">
                <label class="block text-sm font-medium text-purple-900 mb-2">
                    <i class="fas fa-id-card mr-2"></i>RFC Calculado
                </label>
                <div id="rfcResult" class="text-3xl font-bold text-purple-700 text-center py-4">
                    ---
                </div>
                <p class="text-xs text-purple-600 text-center mt-2">
                    <i class="fas fa-info-circle"></i> La homoclave (XXX) debe ser asignada por el SAT
                </p>
            </div>

            <button onclick="calcular()" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 rounded-lg transition-all">
                <i class="fas fa-magic mr-2"></i>Calcular RFC
            </button>
        </div>

        <div class="mt-8 bg-blue-50 border border-blue-200 rounded-lg p-4">
            <h3 class="font-bold text-blue-900 mb-2">
                <i class="fas fa-lightbulb mr-2"></i>Ejemplos de prueba:
            </h3>
            <ul class="text-sm text-blue-800 space-y-1">
                <li><strong>Juan Pérez García</strong> (01/01/1990) → PEGJ900101XXX</li>
                <li><strong>María José López Martínez</strong> (15/05/1985) → LOMM850515XXX</li>
                <li><strong>Carlos de la Cruz Sánchez</strong> (20/12/1992) → CUSC921220XXX</li>
            </ul>
        </div>
    </div>

    <script>
        /**
         * Función para calcular RFC automáticamente
         */
        function calculateRFC(nombre, apellidoPaterno, apellidoMaterno, fechaNacimiento) {
            if (!nombre || !apellidoPaterno || !fechaNacimiento) {
                return '';
            }

            // Limpiar y convertir a mayúsculas
            nombre = nombre.trim().toUpperCase();
            apellidoPaterno = apellidoPaterno.trim().toUpperCase();
            apellidoMaterno = (apellidoMaterno || '').trim().toUpperCase();

            // Palabras a ignorar en apellidos
            const palabrasIgnorar = ['DE', 'LA', 'LAS', 'MC', 'VON', 'DEL', 'LOS', 'Y', 'MAC'];
            
            // Función para limpiar apellido
            function limpiarApellido(apellido) {
                const partes = apellido.split(' ').filter(p => !palabrasIgnorar.includes(p));
                return partes.join(' ') || apellido;
            }

            apellidoPaterno = limpiarApellido(apellidoPaterno);
            apellidoMaterno = limpiarApellido(apellidoMaterno);

            // Función para obtener primera vocal interna
            function primeraVocalInterna(texto) {
                const vocales = 'AEIOU';
                for (let i = 1; i < texto.length; i++) {
                    if (vocales.includes(texto[i])) {
                        return texto[i];
                    }
                }
                return 'X';
            }

            // Construir las primeras 4 letras
            let rfc = '';
            
            // Primera letra y primera vocal interna del apellido paterno
            rfc += apellidoPaterno[0];
            rfc += primeraVocalInterna(apellidoPaterno);
            
            // Primera letra del apellido materno (o X si no existe)
            rfc += apellidoMaterno ? apellidoMaterno[0] : 'X';
            
            // Primera letra del nombre
            const nombrePartes = nombre.split(' ');
            const primerNombre = nombrePartes[0];
            // Ignorar nombres comunes
            if (['MARIA', 'JOSE', 'MA', 'MA.', 'J', 'J.'].includes(primerNombre) && nombrePartes.length > 1) {
                rfc += nombrePartes[1][0];
            } else {
                rfc += primerNombre[0];
            }

            // Agregar fecha de nacimiento (AAMMDD)
            const fecha = new Date(fechaNacimiento + 'T00:00:00');
            const year = fecha.getFullYear().toString().substr(-2);
            const month = String(fecha.getMonth() + 1).padStart(2, '0');
            const day = String(fecha.getDate()).padStart(2, '0');
            
            rfc += year + month + day;

            // Agregar homoclave genérica (XXX para ser asignada por el SAT)
            rfc += 'XXX';

            // Validar palabras inconvenientes
            const palabrasInconvenientes = [
                'BUEI', 'BUEY', 'CACA', 'CACO', 'CAGA', 'CAGO', 'CAKA', 'CAKO',
                'COGE', 'COJA', 'COJE', 'COJI', 'COJO', 'CULA', 'CULO', 'FETO',
                'GUEY', 'JOTO', 'KACA', 'KACO', 'KAGA', 'KAGO', 'KAKA', 'KOGE',
                'KOJO', 'KULO', 'MAME', 'MAMO', 'MEAR', 'MEAS', 'MEON', 'MION',
                'MOCO', 'MULA', 'PEDA', 'PEDO', 'PENE', 'PUTA', 'PUTO', 'QULO',
                'RATA', 'RUIN'
            ];

            if (palabrasInconvenientes.includes(rfc.substr(0, 4))) {
                rfc = rfc[0] + 'X' + rfc.substr(2);
            }

            return rfc;
        }

        function calcular() {
            const nombre = document.getElementById('nombre').value;
            const apellidoPaterno = document.getElementById('apellidoPaterno').value;
            const apellidoMaterno = document.getElementById('apellidoMaterno').value;
            const fechaNacimiento = document.getElementById('fechaNacimiento').value;

            const rfc = calculateRFC(nombre, apellidoPaterno, apellidoMaterno, fechaNacimiento);
            
            const resultDiv = document.getElementById('rfcResult');
            if (rfc) {
                resultDiv.textContent = rfc;
                resultDiv.classList.add('text-green-600');
                resultDiv.classList.remove('text-purple-700');
            } else {
                resultDiv.textContent = 'Complete todos los campos requeridos';
                resultDiv.classList.add('text-red-600');
                resultDiv.classList.remove('text-purple-700', 'text-green-600');
            }
        }

        // Auto-calcular en tiempo real
        ['nombre', 'apellidoPaterno', 'apellidoMaterno', 'fechaNacimiento'].forEach(id => {
            document.getElementById(id).addEventListener('input', calcular);
            document.getElementById(id).addEventListener('change', calcular);
        });
    </script>
</body>
</html>
