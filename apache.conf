<VirtualHost *:80>
    ServerName contigo.lazarza.com.mx
    ServerAdmin admin@lazarza.com.mx
    DocumentRoot /var/www/appwebzarza/public

    # Logging
    ErrorLog /var/log/httpd/contigo.lazarza.com.mx-error.log
    CustomLog /var/log/httpd/contigo.lazarza.com.mx-access.log combined

    # Directory configuration
    <Directory /var/www/appwebzarza/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted

        # Enable URL rewriting
        RewriteEngine On

        # Redirect Trailing Slashes If Not A Folder...
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteCond %{REQUEST_URI} (.+)/$
        RewriteRule ^ %1 [L,R=301]

        # Send Requests To Front Controller...
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteRule ^ index.php [L]
    </Directory>

    # Protect application directory
    <Directory /var/www/appwebzarza>
        # Deny access to .env file
        <FilesMatch "^\.env">
            Require all denied
        </FilesMatch>

        # Deny access to .git directory
        <DirectoryMatch "^\.git">
            Require all denied
        </DirectoryMatch>

        # Deny access to composer files
        <FilesMatch "composer\.(json|lock)">
            Require all denied
        </FilesMatch>

        # Deny access to package files
        <FilesMatch "package(-lock)?\.json">
            Require all denied
        </FilesMatch>
    </Directory>

    # Security headers
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Referrer-Policy "no-referrer-when-downgrade"

    # Hide PHP version
    Header unset X-Powered-By

    # Max upload size
    php_value upload_max_filesize 20M
    php_value post_max_size 20M
    php_value max_execution_time 300
    php_value max_input_time 300

    # Cache static files
    <FilesMatch "\.(jpg|jpeg|gif|png|css|js|ico|xml|svg|woff|woff2|ttf|eot)$">
        Header set Cache-Control "max-age=2592000, public"
    </FilesMatch>

    # Disable directory listing
    <Directory /var/www/appwebzarza/public>
        Options -Indexes
    </Directory>
</VirtualHost>

